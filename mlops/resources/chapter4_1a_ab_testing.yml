resources:
  jobs:
    test-chapter3-5-ab-testing-demo:
      name: test-chapter3-5-ab-testing-demo
      budget_policy_id: "${var.usage_policy_id}"
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl
      tasks:
        - task_key: run_notebook
          environment_key: default
          max_retries: 0
          notebook_task:
            notebook_path: ../notebooks/chapter3_5.ab_testing_demo.py
