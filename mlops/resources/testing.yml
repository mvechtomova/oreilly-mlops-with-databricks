    test-all-notebooks-sequential:
      name: test-all-notebooks-sequential
      tags:
        project_name: "hotel-booking"
      # Positional start index (1-10). Notebooks before this index are skipped.
      # Default 1 runs the full chain. Override at run time, e.g.:
      #   databricks bundle run test-all-notebooks-sequential --params start_from=6
      parameters:
        - name: start_from
          default: "1"
      tasks:
        # idx 1 - chapter2_preprocess_data
        - task_key: gate_chapter2_preprocess_data
          condition_task:
            left: "{{job.parameters.start_from}}"
            op: LESS_THAN_OR_EQUAL
            right: "1"
        - task_key: chapter2_preprocess_data
          max_retries: 0
          run_if: NONE_FAILED
          depends_on:
            - task_key: gate_chapter2_preprocess_data
              outcome: "true"
          run_job_task:
            job_id: ${resources.jobs.test-chapter2-preprocess-data.id}

        # idx 2 - chapter3_1_experiment_tracking_demo
        - task_key: gate_chapter3_1_experiment_tracking_demo
          condition_task:
            left: "{{job.parameters.start_from}}"
            op: LESS_THAN_OR_EQUAL
            right: "2"
        - task_key: chapter3_1_experiment_tracking_demo
          max_retries: 0
          run_if: NONE_FAILED
          depends_on:
            - task_key: gate_chapter3_1_experiment_tracking_demo
              outcome: "true"
            - task_key: chapter2_preprocess_data
          run_job_task:
            job_id: ${resources.jobs.test-chapter3-1-experiment-tracking-demo.id}

        # idx 3 - chapter3_2_model_finetuning
        - task_key: gate_chapter3_2_model_finetuning
          condition_task:
            left: "{{job.parameters.start_from}}"
            op: LESS_THAN_OR_EQUAL
            right: "3"
        - task_key: chapter3_2_model_finetuning
          max_retries: 0
          run_if: NONE_FAILED
          depends_on:
            - task_key: gate_chapter3_2_model_finetuning
              outcome: "true"
            - task_key: chapter3_1_experiment_tracking_demo
          run_job_task:
            job_id: ${resources.jobs.test-chapter3-2-model-finetuning.id}

        # idx 4 - chapter3_3_model_logging_registering_demo
        - task_key: gate_chapter3_3_model_logging_registering_demo
          condition_task:
            left: "{{job.parameters.start_from}}"
            op: LESS_THAN_OR_EQUAL
