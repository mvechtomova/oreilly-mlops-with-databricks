          depends_on:
            - task_key: gate_chapter3_3_model_logging_registering_demo
              outcome: "true"
            - task_key: chapter3_2_model_finetuning
          run_job_task:
            job_id: ${resources.jobs.test-chapter3-3-model-logging-registering-demo.id}

        # idx 5 - chapter3_4_model_evaluation
        - task_key: gate_chapter3_4_model_evaluation
          condition_task:
