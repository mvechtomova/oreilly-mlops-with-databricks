    test-chapter2-preprocess-data:
      name: test-chapter2-preprocess-data
      tags:
        project_name: "hotel-booking"
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl
      tasks:
