name: CD MLOps

on:
  push:
    branches:
      - 'main'
    paths:
      - 'mlops/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [acc, prd]
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write # to fetch openID token
      contents: write # to push tag
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 #v6.1.0
        with:
          role-to-assume: ${{ vars.ARN_ROLE }}
          aws-region: eu-west-1

      - name: Fetch secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@2cb1a461cbd4865ac4299648312e4704c646cd53 #v3.0.1
        # will parse secret called DATABRICKS_CLIENT_ID and DATABRICKS_CLIENT_SECRET
        with:
          secret-ids: |
            , ${{ vars.SECRET_ID }}
          parse-json-secrets: true

      - name: Install Databricks CLI
        uses: databricks/setup-cli@2260866f83a41a2df55e1cfe7ffe038b78325bf6 #v0.295.0
        with:
          version: 0.295.0

      - name: Install uv
        uses: astral-sh/setup-uv@0cec208311dfd045dd5311c1add060b2062131d57 #v8.0.0

      - name: Deploy to Databricks
        env:
          DATABRICKS_BUNDLE_ENV: ${{ matrix.environment }}
        run: databricks bundle deploy --var="git_sha=${{ github.sha }}"
