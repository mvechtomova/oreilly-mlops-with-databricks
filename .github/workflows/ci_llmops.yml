name: CI MLOps

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'llmops'

jobs:
  pytest_and_checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          # Fetch all history for all branches and tags
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@0cec208311dfd045dd5311c1add060b2062131d57 #v8.0.0

      - name: Install the dependencies
        run: |
          uv sync --extra ci

      - name: Run pre-commit checks
        run: |
          uv run pre-commit run --all-files

      - name: run pytest
        run: |
          uv run pytest