resources:
  jobs:
    integration_test_pipeline:
      name: arxiv-integration-test-pipeline
      budget_policy_id: "${var.usage_policy_id}"
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: process_data
          environment_key: default
          notebook_task:
            notebook_path: deployment_notebooks/process_data.py
            base_parameters:
              env: "${bundle.target}"
              integration_testing: "true"

        - task_key: register_deploy_agent
          depends_on:
            - task_key: process_data
          run_job_task:
            job_id: "${resources.jobs.register_deploy_agent.id}"

        - task_key: production_monitoring
          depends_on:
            - task_key: register_deploy_agent
          run_job_task:
            job_id: "${resources.jobs.update-and-evaluate-traces.id}"
