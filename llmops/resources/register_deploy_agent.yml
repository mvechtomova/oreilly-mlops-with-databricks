resources:
  jobs:
    log_register_agent_job:
      name: arxiv-agent-log-register
      tags:
        project_name: "arxiv-curator"
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: log_register_agent
          environment_key: default
          notebook_task:
            notebook_path: deployment_notebooks/log_register_agent.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"

    deploy_agent_job:
      name: arxiv-agent-deploy
      tags:
        project_name: "arxiv-curator"
      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: deploy_agent
          environment_key: default
          notebook_task:
            notebook_path: deployment_notebooks/deploy_agent.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"

    register_deploy_agent:
      name: arxiv-agent-register-deploy-pipeline
      tags:
        project_name: "arxiv-curator"

      tasks:
        - task_key: run_log_register_agent
          run_job_task:
            job_id: ${resources.jobs.log_register_agent_job.id}

        - task_key: run_deploy_agent
          depends_on:
            - task_key: run_log_register_agent
          run_job_task:
            job_id: ${resources.jobs.deploy_agent_job.id}
